<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contactez-moi</title>
    <style>
        /* Le CSS : C'est ici qu'on gère le "Design" demandé par l'exercice 6 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contact-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9em;
        }

        /* Styliser les lignes de texte (input) et la zone de message (textarea) */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Pour que la largeur soit bien respectée */
            font-size: 1em;
        }

        textarea {
            resize: vertical; /* Permet à l'utilisateur d'agrandir seulement en hauteur */
            min-height: 100px;
        }

        button {
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #a29bfe;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Parlons-nous !</h1>
        
        <form>
            <label for="fname">Prénom</label>
            <input type="text" id="fname" name="firstname" placeholder="Ton prénom...">

            <label for="lname">Nom</label>
            <input type="text" id="lname" name="lastname" placeholder="Ton nom de famille...">

            <label for="subject">Message</label>
            <textarea id="subject" name="message" placeholder="Écris-moi quelque chose..."></textarea>

            <button type="button">Envoyer le message</button>
        </form>
    </div>

</body>
</html>
